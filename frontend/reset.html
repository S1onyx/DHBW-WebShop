<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Passwort zurücksetzen</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      background: #f5f7fa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
    }

    .reset-container {
      background: white;
      padding: 2.5rem;
      border-radius: 1rem;
      text-align: center;
      max-width: 400px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.1);
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 1rem;
    }

    p {
      font-size: 1rem;
      color: #555;
      margin-bottom: 1.5rem;
    }

    input {
      width: 100%;
      padding: 0.6rem;
      margin-bottom: 1rem;
      border-radius: 0.5rem;
      border: 1px solid #ccc;
      font-size: 1rem;
    }

    button {
      background-color: #007bff;
      color: white;
      padding: 0.7rem 1.2rem;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      font-size: 1rem;
    }

    button:hover {
      background-color: #0056b3;
    }

    .success {
      color: #28a745;
    }

    .error {
      color: #dc3545;
    }
  </style>
</head>
<body>
  <div class="reset-container" id="reset-container">
    <h1>🔐 Passwort zurücksetzen</h1>
    <p>Bitte neues Passwort eingeben.</p>

    <form id="reset-form">
      <input type="password" id="new-password" placeholder="Neues Passwort" required />
      <button type="submit">Passwort setzen</button>
    </form>

    <div id="message"></div>
  </div>

  <script>
    const form = document.getElementById('reset-form');
    const passwordInput = document.getElementById('new-password');
    const messageBox = document.getElementById('message');
    const container = document.getElementById('reset-container');
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
      container.innerHTML = `
        <h1 class="error">❌ Kein Token vorhanden</h1>
        <p>Der Link ist ungültig oder unvollständig.</p>
      `;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      messageBox.textContent = '';

      const newPassword = passwordInput.value;

      if (
        newPassword.length < 8 ||
        !/[A-Z]/.test(newPassword) ||
        !/[a-z]/.test(newPassword) ||
        !/\d/.test(newPassword) ||
        !/[^A-Za-z0-9]/.test(newPassword)
      ) {
        messageBox.textContent = '❌ Passwort muss mindestens 8 Zeichen lang sein und Groß-, Kleinbuchstaben, Zahlen und Sonderzeichen enthalten.';
        messageBox.className = 'error';
        return;
      }

      try {
        const res = await fetch('/api/auth/reset?token=' + encodeURIComponent(token), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ newPassword })
        });

        const result = await res.json();

        if (res.ok && result.success) {
          container.innerHTML = `
            <h1 class="success">✅ Passwort geändert</h1>
            <p>Du kannst dich jetzt mit deinem neuen Passwort einloggen.</p>
            <a href="/login" class="button">Zum Login</a>
          `;
        } else {
          messageBox.textContent = `❌ ${result.error || 'Unbekannter Fehler'}`;
          messageBox.className = 'error';
        }
      } catch (err) {
        messageBox.textContent = '❌ Netzwerkfehler. Bitte versuche es später erneut.';
        messageBox.className = 'error';
      }
    });
  </script>
</body>
</html>
