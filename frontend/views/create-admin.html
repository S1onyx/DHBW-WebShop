<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Create Admin</title>
  <link rel="stylesheet" href="/css/header-footer.css" />
    <link rel="stylesheet" href="/css/style.css" />
  <script src="/env.js"></script>
  <script src="/js/auth_util.js" defer></script>
  <style>
    /* global box-sizing für alle Elemente */
*, *::before, *::after {
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 0;
  background-color: #f9f9f9;
}

.container {
  max-width: 600px;
  margin: 3rem auto;
  background: #fff;
  padding: 2rem;
  border-radius: 8px;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
  width: 100%;
}

h1 {
  text-align: center;
  margin-bottom: 1.5rem;
}

form label {
  display: block;
  margin-top: 1rem;
  font-weight: bold;
}

form input, form select {
  width: 100%;
  max-width: 100%;
  padding: 0.5rem;
  margin-top: 0.3rem;
  border: 1px solid #ccc;
  border-radius: 4px;
  display: block;
  /* box-sizing: border-box;  global gesetzt */
}

.submit {
  margin-top: 2rem;
  width: 100%;
  padding: 0.7rem;
  background-color: #1976d2;
  color: white;
  border: none;
  border-radius: 4px;
  font-size: 1rem;
  cursor: pointer;
  transition: background-color 0.2s ease;
}

.submit:hover {
  background-color: #125aab;
}

.password-wrapper {
  position: relative;
  width: 100%;
}

.password-input {
  width: 100%;
  padding-right: 4rem; /* Platz für Button */
}

.toggle-password-button {
  position: absolute;
  right: 0.5rem;
  top: 50%;
  transform: translateY(-50%);
  background: transparent;
  border: none;
  color: #1976d2;
  cursor: pointer;
  font-weight: bold;
  padding: 0 0.5rem;
  height: 100%;
}

.success-message, .error-message {
  margin-top: 1rem;
  padding: 0.7rem;
  border-radius: 4px;
  display: none;
}

.success-message {
  background-color: #d4edda;
  color: #155724;
}

.error-message {
  background-color: #f8d7da;
  color: #721c24;
}

/* Tablets & kleinere Laptops */
@media (max-width: 1024px) {
  .container {
    margin: 1.5rem auto;
    padding: 1.5rem;
    max-width: 90%;
  }

  form label {
    margin-top: 0.8rem;
  }

  form input,
  form select,
  .submit {
    font-size: 1rem;
    padding: 0.8rem;
  }

  .submit {
    margin-top: 1.5rem;
  }

  .password-input {
    padding-right: 3.5rem;
  }
}

/* Smartphones & kleine Tablets */
@media (max-width: 768px) {
  body {
    font-size: 16px;
    padding: 1rem;
  }

  .container {
    margin: 1rem auto;
    padding: 1rem;
    max-width: 95%;
  }

  h1 {
    font-size: 1.5rem;
  }

  form label {
    font-size: 1rem;
  }

  form input,
  form select,
  .submit {
    font-size: 1rem;
    padding: 1rem;
  }

  .password-input {
    padding-right: 3.5rem;
  }
}

/* Kleine Smartphones */
@media (max-width: 480px) {
  h1 {
    font-size: 1.3rem;
  }

  .container {
    padding: 0.8rem 1rem;
    margin: 0.5rem auto;
  }

  form label {
    font-size: 0.95rem;
  }

  form input,
  form select,
  .submit {
    font-size: 1rem;
    padding: 1rem;
  }

  .password-input {
    padding-right: 3.5rem;
  }
}

  </style>
</head>
<body>
<div id="header"></div>
<div style="min-height: 85vh;">
  <div class="container">
    <h1>Create Admin</h1>

    <form id="adminForm">
      <label for="first_name">First Name</label>
      <input type="text" id="first_name" name="first_name" required />

      <label for="last_name">Last Name</label>
      <input type="text" id="last_name" name="last_name" required />

      <label for="username">Username</label>
      <input type="text" id="username" name="username" required />

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required />

      <label for="password">Password</label>
      <div class="password-wrapper auth-input" id="password-wrapper">
        <input type="password" id="password" name="password" placeholder="Password" class="password-input" required>
        <button type="button" id="toggle-password" class="toggle-password-button">Show</button>
      </div>

      <label for="street">Street</label>
      <input type="text" id="street" name="street" required />

      <label for="house_number">House Number</label>
      <input type="text" id="house_number" name="house_number" required />

      <label for="postal_code">Postal Code</label>
      <input type="text" id="postal_code" name="postal_code" required />

      <label for="city">City</label>
      <input type="text" id="city" name="city" required />

      <label for="country">Country</label>
      <input type="text" id="country" name="country" required />

      <label for="role_id">Role</label>
      <select id="role_id" name="role_id" required>
        <option value="1">Admin</option>
        <option value="2">Seller</option>
        <option value="3">Customer</option>
      </select>

      <button class="submit" type="submit">Create Admin</button>

    </form>
  </div>
</div>

<div id="footer"></div>

<script type="module">
  import {showPopupMessage} from "/js/utils.js";
  // Load header and footer
  document.addEventListener('DOMContentLoaded', () => {
    async function loadFragment(id, url, scriptUrl) {
      const res = await fetch(url);
      if (res.ok) {
        document.getElementById(id).innerHTML = await res.text();
        if (scriptUrl) {
          const script = document.createElement('script');
          script.src = scriptUrl;
          script.defer = true;
          document.body.appendChild(script);
        }
      }
    }

    loadFragment('header', '/header-footer/header.html', '/js/header.js');
    loadFragment('footer', '/header-footer/footer.html');
  });

  const password = new inputObject("password", "password-wrapper", "Please enter password!", "password-error", isElementNotEmpty);
  document.getElementById("toggle-password").addEventListener("click", function (event) {
    const passwordInput = password.getElement();
    const toggleButton = document.getElementById("toggle-password");

    togglePassword(toggleButton, passwordInput);
  })
  // Handle form submission
  document.getElementById('adminForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const form = e.target;
    const data = {
      first_name: form.first_name.value,
      last_name: form.last_name.value,
      username: form.username.value,
      email: form.email.value,
      password: form.password.value,
      street: form.street.value,
      house_number: form.house_number.value,
      postal_code: form.postal_code.value,
      city: form.city.value,
      country: form.country.value,
      role_id: parseInt(form.role_id.value)
    };


    try {
      const res = await fetch(`http://${window.ROOT_URL}:3000/api/admin/register`, {
        method: 'POST',
        credentials: 'include',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(data)
      });

      if (res.ok) {
        showPopupMessage('Admin created successfully!', 2000);
        form.reset();
        setTimeout(() => window.location.href = '/profile', 2000); // Redirect after 2s
      } else {
        const errText = await res.text(); // get full response text
        try {
          const err = JSON.parse(errText);
          showPopupMessage("Error: " + (err.error || err.message || 'Something went wrong.'), 3000);
        } catch {
          showPopupMessage("Error: " + errText, 3000); // fallback if not valid JSON
        }
      }
    } catch (err) {
      showPopupMessage("'Server unreachable or network error.'", 3000);
    }
  });
</script>
</body>
</html>
