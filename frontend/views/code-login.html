<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/env.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Login</title>
    <link rel="stylesheet" href="/css/style.css" type="text/css">
    <link rel="stylesheet" href="/css/auth.css" type="text/css">
    <script src="/js/auth_util.js" defer></script>
    <script src="/js/code-login.js" defer></script>
    <style>
/* Grundlayout sichern */
html, body {
  max-width: 100%;
  overflow-x: hidden;
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* Karte zentrieren und eingrenzen */
.card-container.auth-container {
  width: 100%;
  max-width: 500px;
  margin: 0 auto;
  padding: 2rem;
  box-sizing: border-box;
  background: #fff;
  border-radius: 8px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

/* Inhaltselemente in der Karte */
.auth-form {
  display: flex;
  flex-direction: column;
  gap: 1rem;
  box-sizing: border-box;
}

.auth-input,
.auth-button {
  width: 100%;
  box-sizing: border-box;
  font-size: 1rem;
  padding: 1rem;
}

/* Feedback-Meldungen */
.auth-error, .auth-success {
  font-size: 1rem;
  text-align: center;
  padding: 0.5rem;
  box-sizing: border-box;
  word-wrap: break-word;
}

/* Responsive Anpassung: Tablets */
@media (max-width: 1024px) {
  .card-container.auth-container {
    padding: 1.5rem;
  }
}

/* Smartphones */
@media (max-width: 768px) {
  main {
    padding: 1rem;
  }

  .card-container.auth-container {
    padding: 1rem;
  }

  .auth-title {
    font-size: 1.4rem;
    text-align: center;
  }

  .auth-input,
  .auth-button {
    padding: 0.9rem;
    font-size: 1rem;
  }

  .auth-error,
  .auth-success {
    font-size: 0.95rem;
  }
}

/* Kleine Smartphones */
@media (max-width: 480px) {
  .card-container.auth-container {
    padding: 1rem;
  }

  .auth-title {
    font-size: 1.2rem;
  }

  .auth-input,
  .auth-button {
    padding: 0.8rem;
    font-size: 1rem;
  }

  .auth-error,
  .auth-success {
    font-size: 0.9rem;
    padding: 0.5rem;
  }
}
.card-container.auth-container {
  width: 100%;
  max-width: 500px;
  margin: 0 auto;
  padding: 1.5rem;
  background: #fff;
  border-radius: 8px;
  box-sizing: border-box;
  overflow: hidden;
}

.auth-form {
  display: flex;
  flex-direction: column;
  gap: 1rem;
  width: 100%;
  box-sizing: border-box;
}

.auth-form * {
  max-width: 100%;
  width: 100%;
  box-sizing: border-box;
}

</style>

</head>
<body>
    <div id="header"></div>
    <main>
        <div class="card-container auth-container" id="code-login-contaier">
            <h1 class="auth-title">Request Code for Login</h1>
            <div class="auth-error" id="code-login-error">Username/E-Mail or password is wrong.</div>
            <div class="auth-success" id="code-login-success">Code sent successfully.</div>
            <form id="code-login-form" class="auth-form" novalidate>
                <label for="username-email" hidden>Username/ E-Mail</label>
                <input type="text" placeholder="Username/ E-Mail" name="username-email" id="username-email" class="auth-input" required>
                <div class="error-message" id="username-email-error"></div>
                
                <input type="submit" class="auth-button first-button" value="Request Code for Login">
                <button class="auth-button second-button" id="back-to-login" type="button">Back to Login</button>
            </form>
            
        </div>
    </main>
    <div id="footer"></div>
    <script>
  document.addEventListener('DOMContentLoaded', () => {
    async function loadFragment(id, url, scriptUrl) {
      const res = await fetch(url);
      if (res.ok) {
        document.getElementById(id).innerHTML = await res.text();
        if (scriptUrl) {
          const script = document.createElement('script');
          script.src = scriptUrl;
          script.defer = true;
          document.body.appendChild(script);
        }
      }
    }

    loadFragment('header', '/header-footer/header.html', '/js/header.js');
    loadFragment('footer', '/header-footer/footer.html');
  });
</script>
</body>


</html>
