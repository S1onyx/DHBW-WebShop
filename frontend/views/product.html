<!-- product_page.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Produktdetails</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/css/product.css" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div id="header"></div>
<main>
  <button onclick="history.back()" class="back-button">← Zurück</button>
  <div class="product-container">

    <div id="product-images" class="product-images"></div>

    <h1 id="product-title" class="product-title"></h1>
    <p id="product-seller" class="product-seller"></p>
    <p id="product-description" class="product-description"></p>
    <p id="product-price" class="product-price"></p>
    <p id="product-stock" class="product-stock"></p>

    <button class="product-buy">Jetzt kaufen</button>

    <section class="reviews">
      <h2>Bewertungen</h2>
      <ul id="review-list" class="review-list"></ul>
    </section>
  </div>
</main>

<div id="footer"></div>

<script type="module" src="/js/product.js"></script>
</body>
</html>
