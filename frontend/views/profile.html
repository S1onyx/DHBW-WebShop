<!DOCTYPE html>
<html lang="de">
<head>
    <script src="/env.js"></script>
    <meta charset="UTF-8" />
    <title>Profil</title>
    <style>

        .profile-container {
            max-width: 400px;
            margin: 4rem auto;
            background: #fff;
            border-radius: 0.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 2rem;
        }
        .profile-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .profile-header h2 {
            margin: 0;
            color: #007BFF;
        }
        .profile-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .profile-list li {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid #eee;
        }
        .profile-list li:last-child {
            border-bottom: none;
        }
        .profile-label {
            color: #555;
            font-weight: bold;
        }
        .profile-value {
            color: #222;
            text-align: right;
            max-width: 60%;
            word-break: break-all;
        }
        .error-message {
            color: #c00;
            text-align: center;
            margin-top: 2rem;
        }
        .back-button {
            background-color: #e0e0e0;
            border: none;
            padding: 0.5rem 1rem;
            margin: 2rem;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 6px;
            transition: background-color 0.2s ease;
        }
        .edit-profile-btn {
            background-color: #007BFF;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 0.7rem 1.2rem;
            font-size: 1rem;
            cursor: pointer;
            margin: 0.5rem 0.2rem;
            transition: background 0.2s, box-shadow 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.07);
        }

        .edit-profile-btn:hover,
        .edit-profile-btn:focus {
            background-color: #0056b3;
            outline: none;
        }
    </style>
</head>
<body>
<div id="header"></div>

<button onclick="history.back()" class="back-button">← Zurück</button>
<div class="profile-container">
    <div class="profile-header">
        <h2>Profil</h2>
        <p id="profile-username"></p>
    </div>
    <ul class="profile-list" id="profile-list">
        <!-- Profildaten werden hier eingefügt -->
    </ul>
    <div class="error-message" id="error-message" style="display:none;"></div>
    <button id="edit-profile-btn" class="edit-profile-btn" style="margin-top:1rem;width:48%;">Bearbeiten</button>
    <button id="save-profile-btn" class="edit-profile-btn" style="margin-top:1rem;width:48%;display:none;">Speichern</button>
    <button id="logout-btn" class="loginLink" style="margin-top:2rem;width:100%;color: white">Logout</button>
</div>

<div id="footer"></div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        async function loadFragment(id, url, scriptUrl) {
            const res = await fetch(url);
            if (res.ok) {
                document.getElementById(id).innerHTML = await res.text();
                if (scriptUrl) {
                    const script = document.createElement('script');
                    script.src = scriptUrl;
                    script.defer = true;
                    document.body.appendChild(script);
                }
            }
        }
        loadFragment('header', '/header-footer/header.html', '/js/header.js');
        loadFragment('footer', '/header-footer/footer.html');
    });

    const editableFields = [
        { key: "first_name", label: "Vorname" },
        { key: "last_name", label: "Nachname" },
        { key: "street", label: "Straße" },
        { key: "house_number", label: "Hausnummer" },
        { key: "postal_code", label: "PLZ" },
        { key: "city", label: "Stadt" },
        { key: "country", label: "Land" }
    ];

    let userData = null;

    async function loadProfile() {
        try {
            const res = await fetch(`http://${window.ROOT_URL}:3000/api/users/me`, { credentials: 'include' });
            if (!res.ok) throw new Error('Nicht eingeloggt oder Fehler beim Laden');
            const user = await res.json();
            userData = user.data;

            document.getElementById('profile-username').textContent =
                `${user.data.username} (${user.data.first_name} ${user.data.last_name})`;

            const list = document.getElementById('profile-list');
            list.innerHTML = '';
            editableFields.forEach(f => {
                const li = document.createElement('li');
                li.innerHTML = `<span class="profile-label">${f.label}:</span> <span class="profile-value" data-key="${f.key}">${user.data[f.key] ?? '-'}</span>`;
                list.appendChild(li);
            });
            // Nicht editierbare Felder
            const liUser = document.createElement('li');
            liUser.innerHTML = `<span class="profile-label">Benutzername:</span> <span class="profile-value">${user.data.username}</span>`;
            list.appendChild(liUser);
            const liMail = document.createElement('li');
            liMail.innerHTML = `<span class="profile-label">E-Mail:</span> <span class="profile-value">${user.data.email}</span>`;
            list.appendChild(liMail);
        } catch (e) {
            document.getElementById('error-message').textContent = 'Fehler beim Laden des Profils. Bitte einloggen.';
            document.getElementById('error-message').style.display = 'block';
            document.getElementById('profile-list').style.display = 'none';
            document.getElementById('profile-username').style.display = 'none';
        }
    }

    document.getElementById('edit-profile-btn').addEventListener('click', () => {
        editableFields.forEach(f => {
            const span = document.querySelector(`.profile-value[data-key="${f.key}"]`);
            const value = userData[f.key] ?? '';
            span.outerHTML = `<input class="profile-input" data-key="${f.key}" value="${value}" style="max-width:60%;text-align:right;" />`;
        });
        document.getElementById('edit-profile-btn').style.display = 'none';
        document.getElementById('save-profile-btn').style.display = 'inline-block';
    });

    document.getElementById('save-profile-btn').addEventListener('click', async () => {
        const data = {};
        editableFields.forEach(f => {
            const input = document.querySelector(`input.profile-input[data-key="${f.key}"]`);
            data[f.key] = input.value;
        });
        const res = await fetch(`http://${window.ROOT_URL}:3000/api/users/${userData.user_id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify(data)
        });
        if (res.ok) {
            location.reload();
        } else {
            alert('Fehler beim Speichern');
        }
    });

    loadProfile();

    const fields = ["first_name", "last_name", "street", "house_number", "postal_code", "city", "country"];
    const profileFieldsDiv = document.getElementById('profile-fields');
    const editBtn = document.getElementById('editProfileBtn');
    const saveBtn = document.getElementById('saveProfileBtn');

    editBtn.addEventListener('click', () => {
        fields.forEach(field => {
            const span = document.getElementById(field);
            const value = span.textContent;
            span.outerHTML = `<input id="${field}" value="${value}" />`;
        });
        editBtn.style.display = 'none';
        saveBtn.style.display = 'inline-block';
    });

    saveBtn.addEventListener('click', async () => {
        const data = {};
        fields.forEach(field => {
            data[field] = document.getElementById(field).value;
        });
        await fetch('http://localhost:3000/api/users/151', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify(data)
        });
        location.reload();
    });
</script>
</body>
</html>
