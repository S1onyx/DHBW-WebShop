<!DOCTYPE html>
<html lang="de">
<head>
    <script src="/env.js"></script>
    <meta charset="UTF-8" />
    <title>Profil</title>
    <link rel="icon" href="/images/logo-svg.svg" type="image/x-icon" />
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f2f4f8;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        #root {
            min-height: 90vh;
        }

        .profile-container {
            max-width: 500px;
            margin: 4rem auto;
            background: #ffffff;
            border-radius: 1rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            padding: 2.5rem 2rem;
            animation: fadeIn 0.5s ease-in;
        }

        .profile-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .profile-header h2 {
            margin: 0;
            font-size: 2rem;
            color: #007BFF;
        }

        .profile-header p {
            font-size: 1rem;
            color: #444;
            margin-top: 0.3rem;
        }

        .profile-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .profile-list li {
            display: flex;
            justify-content: space-between;
            padding: 0.9rem 0;
            border-bottom: 1px solid #e6e6e6;
            font-size: 1rem;
        }

        .profile-label {
            color: #555;
            font-weight: 600;
            flex: 1;
        }

        .profile-value,
        .profile-input {
            flex: 1;
            text-align: right;
            color: #222;
            word-break: break-word;
            max-width: 60%;
        }

        .profile-input {
            border: 1px solid #ccc;
            border-radius: 6px;
            padding: 0.4rem 0.6rem;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .profile-input:focus {
            border-color: #007BFF;
            outline: none;
        }

        .back-button:hover {
            color: #0056b3;
        }

        .edit-profile-btn,
        #logout-btn {
            background-color: #007BFF;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 0.8rem 1rem;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
            transition: background 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
        }

        .edit-profile-btn:hover,
        #logout-btn:hover {
            background-color: #0056b3;
        }

        #logout-btn {
            width: 100%;
            margin-top: 2rem;
            background-color: #dc3545;
        }

        #logout-btn:hover {
            background-color: #b02a37;
        }

        .error-message {
            color: #c00;
            text-align: center;
            margin-top: 2rem;
            font-weight: bold;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 540px) {
            .profile-container {
                margin: 2rem 1rem;
                padding: 2rem 1.5rem;
            }

            .edit-profile-btn {
                width: 100%;
                margin-bottom: 0.5rem;
            }

            #save-profile-btn {
                width: 100%;
            }
        }
        .back-button{
            background-color: #e0e0e0 !important;
            border: none;
            padding: 0.5rem 1rem;
            margin: 2rem;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 6px;
            color: #1a1a1a;
            transition: background-color 0.2s ease;
        }
    </style>
</head>
<body>
<div id="header"></div>
<div id="root">
    <button onclick="history.back()" class="back-button">← Back</button>
    <div class="profile-container">
        <div class="profile-header">
            <h2>Profile</h2>
            <p id="profile-username"></p>
        </div>
        <ul class="profile-list" id="profile-list"></ul>
        <div class="error-message" id="error-message" style="display:none;"></div>

        <div class="button-row">
            <button id="edit-profile-btn" class="edit-profile-btn">Edit</button>
            <a href="/change-password">
                <button id="change-password-btn" class="edit-profile-btn">Change Password</button>
            </a>
        </div>

        <button id="save-profile-btn" class="edit-profile-btn" style="margin-top:1rem; width:100%; display:none;">Save</button>
        <button id="logout-btn" class="loginLink" style="margin-top:2rem; width:100%;">Logout</button>
    </div>
</div>
<div id="footer"></div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        async function loadFragment(id, url, scriptUrl) {
            const res = await fetch(url);
            if (res.ok) {
                document.getElementById(id).innerHTML = await res.text();
                if (scriptUrl) {
                    const script = document.createElement('script');
                    script.src = scriptUrl;
                    script.defer = true;
                    document.body.appendChild(script);
                }
            }
        }
        loadFragment('header', '/header-footer/header.html', '/js/header.js');
        loadFragment('footer', '/header-footer/footer.html');
    });

    const editableFields = [
        { key: "first_name", label: "First Name" },
        { key: "last_name", label: "Last Name" },
        { key: "street", label: "Street" },
        { key: "house_number", label: "House Number" },
        { key: "postal_code", label: "Postal Code" },
        { key: "city", label: "City" },
        { key: "country", label: "Country" }
    ];

    let userData = null;

    async function loadProfile() {
        try {
            const res = await fetch(`http://${window.ROOT_URL}:3000/api/users/me`, { credentials: 'include' });
            if (!res.ok) throw new Error('Not logged in or error fetching profile');
            const user = await res.json();
            userData = user.data;

            document.getElementById('profile-username').textContent =
                `${user.data.username} (${user.data.first_name} ${user.data.last_name})`;

            const list = document.getElementById('profile-list');
            list.innerHTML = '';
            editableFields.forEach(f => {
                const li = document.createElement('li');
                li.innerHTML = `<span class="profile-label">${f.label}:</span> <span class="profile-value" data-key="${f.key}">${user.data[f.key] ?? '-'}</span>`;
                list.appendChild(li);
            });

            const liUser = document.createElement('li');
            liUser.innerHTML = `<span class="profile-label">Username:</span> <span class="profile-value">${user.data.username}</span>`;
            list.appendChild(liUser);

            const liMail = document.createElement('li');
            liMail.innerHTML = `<span class="profile-label">Email:</span> <span class="profile-value">${user.data.email}</span>`;
            list.appendChild(liMail);
        } catch (e) {
            document.getElementById('error-message').textContent = 'Failed to load profile. Please log in.';
            document.getElementById('error-message').style.display = 'block';
            document.getElementById('profile-list').style.display = 'none';
            document.getElementById('profile-username').style.display = 'none';
        }
    }

    document.getElementById('edit-profile-btn').addEventListener('click', () => {
        editableFields.forEach(f => {
            const span = document.querySelector(`.profile-value[data-key="${f.key}"]`);
            const value = userData[f.key] ?? '';
            span.outerHTML = `<input class="profile-input" data-key="${f.key}" value="${value}" style="max-width:60%;text-align:right;" />`;
        });
        document.getElementById('edit-profile-btn').style.display = 'none';
        document.getElementById('save-profile-btn').style.display = 'inline-block';
        document.getElementById('change-password-btn').style.display = 'none';
    });

    document.getElementById('save-profile-btn').addEventListener('click', async () => {
        const data = {};
        editableFields.forEach(f => {
            const input = document.querySelector(`input.profile-input[data-key="${f.key}"]`);
            data[f.key] = input.value;
        });
        const res = await fetch(`http://${window.ROOT_URL}:3000/api/users/${userData.user_id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify(data)
        });
        if (res.ok) {
            location.reload();
        } else {
            alert('Fehler beim Speichern');
        }
    });

    document.getElementById('logout-btn').addEventListener('click', async () => {
        try {
            const res = await fetch(`http://${window.ROOT_URL}:3000/api/auth/logout`, {
                method: 'POST',
                credentials: 'include'
            });
            if (res.ok) {
                window.location.href = '/';
            } else {
                alert('Logout fehlgeschlagen');
            }
        } catch (e) {
            alert('Fehler beim Logout');
        }
    });

    loadProfile();
</script>
</body>
</html>
