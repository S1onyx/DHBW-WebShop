<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/env.js"></script>
    <meta charset="UTF-8">
    <link rel="icon" href="/images/logo-svg.svg" type="image/x-icon" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="/css/style.css" type="text/css">
    <link rel="stylesheet" href="/css/auth.css" type="text/css">
    <script src="/js/auth_util.js" defer></script>
    <script src="/js/reset-password.js" defer></script>
    <style>
      @media (max-width: 768px) {
  .auth-container {
    padding: 1.5rem 1rem !important;
    margin: 0 auto;
    box-sizing: border-box;
    width: 100%;
  }

  .auth-title {
    font-size: 1.6rem !important;
    text-align: center;
  }

  .auth-form {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    width: 100%;
  }

  .auth-input {
    width: 100%;
    font-size: 1rem;
    padding: 0.6rem 0.8rem;
    box-sizing: border-box;
  }

  .auth-button {
    width: 100%;
    font-size: 1rem;
    padding: 0.6rem 0.8rem;
    box-sizing: border-box;
  }

  .auth-error,
  .auth-success,
  .error-message {
    font-size: 0.95rem;
    word-wrap: break-word;
    width: 100%;
  }
}

@media (max-width: 480px) {
  body {
    padding: 1rem;
  }

  .auth-container {
    padding: 1rem 0.5rem !important;
  }

  .auth-input,
  .auth-button {
    font-size: 1rem;
    padding: 0.7rem 1rem;
  }
}

    </style>
</head>
<body>
    <div id="header"></div>
    <main>
        <div class="card-container auth-container" id="forgot-password-contaier">
            <h1 class="auth-title">Reset Password</h1>
            <div class="auth-error" id="request-error">Username/E-Mail or password is wrong.</div>
                    <div class="auth-success" id="request-success">Reset successful.</div>
            <form id="reset-password-form" class="auth-form" novalidate>
                <label for="username-email" hidden>Username/ E-Mail</label>
                <input type="text" placeholder="Username/ E-Mail" name="username-email" id="username-email" class="auth-input" required>
                <div class="error-message" id="username-email-error"></div>
                
                <input type="submit" class="auth-button first-button" value="Request E-Mail to reset Password">
                <button class="auth-button second-button" id="back-to-login">Back to Login</button>
            </form>
            
        </div>
    </main>
    <div id="footer"></div>
    <script>
  document.addEventListener('DOMContentLoaded', () => {
    async function loadFragment(id, url, scriptUrl) {
      const res = await fetch(url);
      if (res.ok) {
        document.getElementById(id).innerHTML = await res.text();
        if (scriptUrl) {
          const script = document.createElement('script');
          script.src = scriptUrl;
          script.defer = true;
          document.body.appendChild(script);
        }
      }
    }

    loadFragment('header', '/header-footer/header.html', '/js/header.js');
    loadFragment('footer', '/header-footer/footer.html');
  });
</script>
</body>


</html>
