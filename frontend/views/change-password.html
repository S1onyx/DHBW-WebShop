<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Change Password</title>
    <script src="/env.js"></script>
  <link rel="stylesheet" href="/css/style.css" type="text/css" />
  <link rel="stylesheet" href="/css/auth.css" type="text/css" />
  <script src="/js/auth_util.js" defer></script>
  <style>
    /* Error and Success Message Styles */
    .auth-success,
    .error-message {
      padding: 0.8rem 1rem;
      margin: 1rem 0;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 500;
      display: none;
      transition: all 0.3s ease-in-out;
    }

    /* Success: Green background with soft border */
    .auth-success {
      background-color: #e6f9ed;
      border: 1px solid #5cbf88;
      color: #2e7d4f;
    }

    /* Error: Red background with soft border */
    .error-message {
      background-color: #fdecea;
      border: 1px solid #f5c6cb;
      color: #c62828;
      align-self: center;
    }

    /* Optional: Add animation when they appear */
    .auth-success.show,
    .error-message.show {
      display: block;
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

  </style>
</head>
<body>
<div id="header"></div>
<main>
  <div class="card-container auth-container">
    <h1 class="auth-title">Change Password</h1>

    <div class="auth-success" id="success-message" style="display:none;">Password changed successfully.</div>
    <div class="error-message" id="error-message" style="display:none;"></div>

    <form id="change-password-form" class="auth-form" novalidate>
      <div class="password-wrapper auth-input" id="password-wrapper">
        <input type="password" id="password" name="password" placeholder="Password" class="password-input" required>
        <button type="button" id="toggle-password" class="toggle-password-button">Show</button>
      </div>

      <div class="password-wrapper auth-input" id="password-wrapper 2">
        <input type="password" placeholder="New Password" id="new_password" class="password-input" required/>
        <button type="button" id="toggle_2" class="toggle-password-button">Show</button>
      </div>

      <div class="password-wrapper auth-input" id="password-wrapper 3">
        <input type="password" placeholder="Repeat New Password" id="confirm_password" class="password-input" required/>
        <button type="button" id="toggle_3" class="toggle-password-button">Show</button>
      </div>

      <button type="submit" class="auth-button" style="margin-top: 2rem; background-color: #0d47a1; color: white">
        Change Password
      </button>
    </form>
  </div>
</main>
<div id="footer"></div>

<script type="module">
  import {showPopupMessage} from "/js/utils.js";


  document.addEventListener('DOMContentLoaded', () => {
    async function loadFragment(id, url, scriptUrl) {
      const res = await fetch(url);
      if (res.ok) {
        document.getElementById(id).innerHTML = await res.text();
        if (scriptUrl) {
          const script = document.createElement('script');
          script.src = scriptUrl;
          script.defer = true;
          document.body.appendChild(script);
        }
      }
    }

    loadFragment('header', '/header-footer/header.html', '/js/header.js');
    loadFragment('footer', '/header-footer/footer.html');
  });

  const password = new inputObject("password", "password-wrapper", "Please enter password!", "password-error", isElementNotEmpty);
  const newPassword = new inputObject("new_password", "password-wrapper 2", "Please enter new password!", "new-password-error", isElementNotEmpty);
  const confirmPassword = new inputObject("confirm_password", "password-wrapper 3", "Please confirm your new password!", "confirm-password-error", isElementNotEmpty);

  document.addEventListener("DOMContentLoaded", () => {
    const passwordInput = password.getElement();
    const newPasswordInput = newPassword.getElement();
    const confirmPasswordInput = confirmPassword.getElement();

    const toggleButton1 = document.getElementById("toggle-password");
    const toggleButton2 = document.getElementById("toggle_2");
    const toggleButton3 = document.getElementById("toggle_3");

    toggleButton1.addEventListener("click", () => {
      togglePassword(toggleButton1, passwordInput);
    });

    toggleButton2.addEventListener("click", () => {
      togglePassword(toggleButton2, newPasswordInput);
    });

    toggleButton3.addEventListener("click", () => {
      togglePassword(toggleButton3, confirmPasswordInput);
    });
  });

  document.addEventListener("DOMContentLoaded", () => {
    const form = document.getElementById("change-password-form");
    const successMsg = document.getElementById("success-message");
    const errorMsg = document.getElementById("error-message");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const old_password = document.getElementById("old_password").value.trim();
      const new_password = document.getElementById("new_password").value.trim();
      const confirm_password = document.getElementById("confirm_password").value.trim();

      // Clear previous messages
      successMsg.style.display = "none";
      errorMsg.style.display = "none";

      // Validation
      if (new_password === old_password) {
        errorMsg.textContent = "New password must be different from the current password.";
        errorMsg.style.display = "block";
        return;
      }

      if (new_password !== confirm_password) {
        errorMsg.textContent = "New password and confirmation do not match.";
        errorMsg.style.display = "block";
        return;
      }

      try {
        const res = await fetch(`http://${window.ROOT_URL}:3000/api/auth/change-password`, {
          method: "PUT",
          credentials: "include",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ old_password, new_password, confirm_password }),
        });

        const data = await res.json();

        if (res.ok) {
          form.reset();
          showPopupMessage("Password changed successfully.", 2000);
          setTimeout(() => {
            window.location.href = "/profile.html";
          }, 2000);
        } else {
          errorMsg.textContent = data.error || "An error occurred.";
          errorMsg.style.display = "block";
        }
      } catch (err) {
        errorMsg.textContent = "Could not connect to server.";
        errorMsg.style.display = "block";
      }
    });
  });
</script>
</body>
</html>
