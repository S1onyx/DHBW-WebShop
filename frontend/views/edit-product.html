<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Edit Product</title>
  <link rel="stylesheet" href="/css/edit-product.css">  <!-- Dann DEIN Styling! -->
  <script src="/env.js"></script>
  <link rel="icon" href="/images/logo-svg.svg" type="image/x-icon" />
  <script type="module" src="/js/edit-product.js" defer></script>
</head>
<body>
<div id="header"></div>
<button onclick="history.back()" class="back-button">← Back</button>
<main>
  <section>
    <h1>Edit Product</h1>
    <form id="edit-product-form">
      <label>Name: <input type="text" name="name" required></label><br>
      <label>Description: <textarea name="description" required></textarea></label><br>
      <label>Stock: <input type="number" name="stock" min="0" required></label><br>
      <label>Price: <input type="number" name="price" step="0.01" required></label><br>
      <label>Category:
        <select name="category_id" id="category_id" >
          <option value="">Please select:</option>
          <!-- Options are inserted by JS -->
        </select>
      </label>
      <div id="images-list"></div>
      <button type="submit">Save</button>
    </form>
    <div id="message"></div>
  </section>
</main>
<div id="footer"></div>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    async function loadFragment(id, url, scriptUrl) {
      const res = await fetch(url);
      if (res.ok) {
        document.getElementById(id).innerHTML = await res.text();
        if (scriptUrl) {
          const script = document.createElement('script');
          script.src = scriptUrl;
          script.defer = true;
          document.body.appendChild(script);
        }
      }
    }
    loadFragment('header', '/header-footer/header.html', '/js/header.js');
    loadFragment('footer', '/header-footer/footer.html');
  });
</script>
</body>
</html>
