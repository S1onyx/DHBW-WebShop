<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link rel="stylesheet" href="/css/style.css" type="text/css">
    <link rel="stylesheet" href="/css/auth.css" type="text/css">
    <script src="/js/auth_util.js" defer></script>
    <script src="/js/login.js" defer></script>
</head>
<body>
  <div id="header"></div>
    <main>
        <div class="card-container auth-container" id="login-container">
            <h1 class="auth-title">Login</h1>
            <div class="auth-error" id="login-error">Username/E-Mail or password is wrong.</div>
            <div class="auth-success" id="login-success">Login successful.</div>
            <form id="login-form" class="auth-form" novalidate>
                <label for="username-email" hidden>Username/ E-Mail</label>
                <input type="text" id="username-email" name="username-email" placeholder="Username/ E-Mail" class="auth-input" required>
                <div class="error-message" id="username-email-error"></div>

                <label for="password" hidden>Password</label>
                <div class="password-wrapper auth-input" id="password-wrapper">
                  <input type="password" id="password" name="password" placeholder="Password" class="password-input" required>
                  <button type="button" id="toggle-password" class="toggle-password-button">Show</button>
                </div>

                <div id="below-password">
                    <a href="#" id="forgot-password-link" class="forgot-password-link">Forgot Password? Reset here!</a>
                    <div class="error-message" id="password-error"></div>
                </div>

                <input type="submit" class="auth-button first-button" value="Log in">
                <button class="auth-button second-button" id="to-signup">New here? Sign up!</button>
            </form>
        </div>
    </main>
    <div id="footer"></div>
    <script>
  document.addEventListener('DOMContentLoaded', () => {
    async function loadFragment(id, url, scriptUrl) {
      const res = await fetch(url);
      if (res.ok) {
        document.getElementById(id).innerHTML = await res.text();
        if (scriptUrl) {
          const script = document.createElement('script');
          script.src = scriptUrl;
          script.defer = true;
          document.body.appendChild(script);
        }
      }
    }

    loadFragment('header', '/header-footer/header.html', '/js/header.js');
    loadFragment('footer', '/header-footer/footer.html');
  });
</script>
</body>

</html>
