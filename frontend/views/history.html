<!DOCTYPE html>
<html lang="en">

<head>
  <script src="/env.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>History</title>
  <link rel="stylesheet" href="/css/style.css" type="text/css">
  <link rel="stylesheet" href="/css/history.css" type="text/css">
  <link rel="stylesheet" href="/css/wishlist-selection.css" type="text/css">
  <style>
    /* Grundstil für user-list (z.B. #history-list) */
#history-list {
  max-width: 100%;
  overflow-x: auto;
  border: 1px solid #ccc;
  border-radius: 6px;
  padding: 1rem;
  background: #fff;
  box-shadow: inset 0 0 5px rgba(0,0,0,0.05);
}

/* Responsive Anpassungen */

@media (max-width: 1024px) {
  #history-container {
    max-width: 90%;
    margin: 0 auto;
  }

  #history-list {
    padding: 1rem;
  }

  label,
  select,
  #status {
    font-size: 1rem;
    padding: 0.6rem 0.8rem;
    width: 100%;
    box-sizing: border-box;
  }
}

@media (max-width: 768px) {
  #history-container {
    max-width: 95%;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  label,
  select,
  #status {
    width: 100%;
  }
}

@media (max-width: 480px) {
  body {
    padding: 1rem;
  }

  #history-container {
    padding: 1rem 0.5rem;
  }

  label,
  select,
  #status {
    font-size: 1rem;
    padding: 0.7rem 1rem;
  }
}

  </style>
  <script type="module" src="/js/history.js" defer></script>
</head>

<body>
  <div id="header"></div>
  <main>
    <div id="history-container" class="container">
      <div id="history-top" class="history-top">
        <h1 id="history-title">History</h1>
        <p id="info" class="info" hidden>No history yet</p>
        <p id="server-error" class="server-error" hidden>Server Error</p>
      </div>

      <label for="status">Show only orders with status:</label>
      <select id="status" class="status-dropdown">
        <option class="status-option" value="0" selected>All</option>
        <option class="status-option" value="1">Pending</option>
        <option class="status-option" value="2">Processing</option>
        <option class="status-option" value="3">Shipped</option>
        <option class="status-option" value="4">Delivered</option>
        <option class="status-option" value="5">Cancelled</option>
      </select>


      <ul id="history-list" class="history-list"></ul>
    </div>
  </main>
  <div id="footer"></div>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      async function loadFragment(id, url, scriptUrl) {
        const res = await fetch(url);
        if (res.ok) {
          document.getElementById(id).innerHTML = await res.text();
          if (scriptUrl) {
            const script = document.createElement('script');
            script.src = scriptUrl;
            script.defer = true;
            document.body.appendChild(script);
          }
        }
      }

      loadFragment('header', '/header-footer/header.html', '/js/header.js');
      loadFragment('footer', '/header-footer/footer.html');
    });
  </script>
</body>


</html>
