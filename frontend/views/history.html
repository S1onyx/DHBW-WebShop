<!DOCTYPE html>
<html lang="en">
<head>
    <script src="/env.js"></script>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        .back-button {
            background-color: #e0e0e0;
            border: none;
            padding: 0.5rem 1rem;
            margin: 2rem;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 6px;
            transition: background-color 0.2s ease;
        }
        </style>
</head>
<body>
<div id="header"></div>
<button onclick="history.back()" class="back-button">← Zurück</button>

HISTORY PAGE

<div id="footer"></div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        async function loadFragment(id, url, scriptUrl) {
            const res = await fetch(url);
            if (res.ok) {
                document.getElementById(id).innerHTML = await res.text();
                if (scriptUrl) {
                    const script = document.createElement('script');
                    script.src = scriptUrl;
                    script.defer = true;
                    document.body.appendChild(script);
                }
            }
        }
        loadFragment('header', '/header-footer/header.html', '/js/header.js');
        loadFragment('footer', '/header-footer/footer.html');
    });
</script>
</body>
</html>
