<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Account-Verifizierung</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      background: #f5f7fa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
    }

    .verify-container {
      background: white;
      padding: 2.5rem;
      border-radius: 1rem;
      text-align: center;
      max-width: 400px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.1);
    }

    h1 {
      font-size: 1.75rem;
      margin-bottom: 1rem;
    }

    p {
      font-size: 1rem;
      color: #555;
      margin-bottom: 2rem;
    }

    .status-success {
      color: #28a745;
    }

    .status-error {
      color: #dc3545;
    }

    .button {
      background-color: #007bff;
      color: white;
      padding: 0.8rem 1.5rem;
      border-radius: 0.5rem;
      text-decoration: none;
      font-size: 1rem;
      transition: background-color 0.2s ease-in-out;
      display: inline-block;
    }

    .button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <div class="verify-container" id="verify-container">
    <h1>Verifiziere deinen Account...</h1>
    <p>Bitte einen Moment Geduld.</p>
  </div>

  <script>
    async function verifyUser() {
      const container = document.getElementById('verify-container');
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');

      if (!token) {
        container.innerHTML = `
          <h1 class="status-error">❌ Kein Token gefunden</h1>
          <p>Der Verifizierungslink ist ungültig oder unvollständig.</p>
        `;
        return;
      }

      try {
        const res = await fetch('/api/auth/verify?token=' + encodeURIComponent(token));
        const result = await res.json();

        if (res.ok && result.success) {
          container.innerHTML = `
            <h1 class="status-success">✅ Verifizierung erfolgreich!</h1>
            <p>Du kannst dich jetzt einloggen.</p>
            <a href="/login" class="button">Zum Login</a>
          `;
        } else {
          const message = result.error || 'Ein unbekannter Fehler ist aufgetreten.';
          const isAlreadyUsed = result.code === 409;
          container.innerHTML = `
            <h1 class="status-error">❌ Verifizierung fehlgeschlagen</h1>
            <p>${message}</p>
            ${isAlreadyUsed ? '<a href="/login" class="button">Zum Login</a>' : ''}
          `;
        }
      } catch (error) {
        container.innerHTML = `
          <h1 class="status-error">❌ Serverfehler</h1>
          <p>Bitte versuche es später erneut.</p>
        `;
      }
    }

    verifyUser();
  </script>
</body>
</html>
