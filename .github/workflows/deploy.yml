name: Build and Push Docker Images

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ dev ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Log in to Docker Hub
      run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

    - name: Build Backend Image
      run: |
        docker build \
          -f docker/Dockerfile.backend \
          -t ${{ secrets.DOCKERHUB_USERNAME }}/webshop-backend:latest \
          backend/

    - name: Push Backend Image
      run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/webshop-backend:latest

    - name: Build Frontend Image
      run: |
        docker build \
          -f docker/Dockerfile.frontend \
          -t ${{ secrets.DOCKERHUB_USERNAME }}/webshop-frontend:latest \
          frontend/

    - name: Push Frontend Image
      run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/webshop-frontend:latest
