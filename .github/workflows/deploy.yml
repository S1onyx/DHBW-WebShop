name: Build and Push Docker Images

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Log in to Docker Hub
      run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

    - name: Build Backend
      run: docker build -f docker/Dockerfile.backend -t ${{ secrets.BACKEND_IMAGE_NAME }}:latest .

    - name: Build Frontend
      run: docker build -f docker/Dockerfile.frontend -t ${{ secrets.FRONTEND_IMAGE_NAME }}:latest .

    - name: Push Backend
      run: docker push ${{ secrets.BACKEND_IMAGE_NAME }}:latest

    - name: Push Frontend
      run: docker push ${{ secrets.FRONTEND_IMAGE_NAME }}:latest
