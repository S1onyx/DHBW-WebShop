name: Label Native Sub-Issues

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  label-subissues:
    runs-on: ubuntu-latest
    steps:
      - name: Label issues that are tracked by others
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.LABEL_TOKEN }}
          script: |
            const { owner, repo } = context.repo;

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              per_page: 100,
            });

            for (const issue of issues) {
              if (issue.pull_request) continue;

              const query = `
                query($owner:String!, $repo:String!, $issue:Int!) {
                  repository(owner:$owner, name:$repo) {
                    issue(number:$issue) {
                      trackedInIssues(first: 1) {
                        nodes {
                          number
                          title
                        }
                      }
                    }
                  }
                }`;

              let result;
              try {
                result = await github.graphql(query, {
                  owner,
                  repo,
                  issue: issue.number,
                });
              } catch (err) {
                console.warn(`⚠️ Failed on issue #${issue.number}: ${err.message}`);
                continue;
              }

              const tracked = result.repository.issue.trackedInIssues.nodes;
              if (tracked.length === 0) {
                console.log(`ℹ️ Issue #${issue.number} is not tracked by any parent`);
                continue;
              }

              const parent = tracked[0];
              let labelName = `Parent: ${parent.title}`;
              if (labelName.length > 50) {
                labelName = `Parent #${parent.number}`;
              }

              console.log(`🏷️ Will label issue #${issue.number} with '${labelName}'`);

              try {
                await github.rest.issues.getLabel({ owner, repo, name: labelName });
              } catch {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: labelName,
                  color: 'cfd3d7',
                });
              }

              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issue.number,
                labels: [labelName],
              });

              console.log(`✅ Labeled issue #${issue.number} with '${labelName}'`);
            }
