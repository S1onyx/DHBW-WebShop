name: Label Sub-Issues from GitHub Project v2

on:
  schedule:
    - cron: '0 0 * * *'  # täglich um Mitternacht UTC
  workflow_dispatch:

permissions:
  issues: write

jobs:
  label-subissues:
    runs-on: ubuntu-latest
    steps:
      - name: Label all tracked sub-issues from Project v2 parents
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.LABEL_TOKEN }}
          script: |
            const { repo, owner } = context.repo;

            // === SETTINGS ===
            const projectOwner = "S1onyx"; // dein GitHub-Benutzername
            const projectNumber = 2; // aus der URL: /projects/2

            // === Step 1: Get Project ID ===
            const getProjectIdQuery = `
              query($login: String!, $number: Int!) {
                user(login: $login) {
                  projectV2(number: $number) {
                    id
                  }
                }
              }
            `;
            const projectData = await github.graphql(getProjectIdQuery, {
              login: projectOwner,
              number: projectNumber,
            });
            const projectId = projectData.user.projectV2.id;

            // === Step 2: Fetch all items with trackedItems ===
            const parentItems = [];
            let endCursor = null;
            let hasNextPage = true;

            while (hasNextPage) {
              const query = `
                query($id: ID!, $after: String) {
                  node(id: $id) {
                    ... on ProjectV2 {
                      items(first: 100, after: $after) {
                        pageInfo {
                          hasNextPage
                          endCursor
                        }
                        nodes {
                          content {
                            ... on Issue {
                              number
                              title
                              repository {
                                name
                                owner { login }
                              }
                            }
                          }
                          trackedItems(first: 10) {
                            nodes {
                              content {
                                ... on Issue {
                                  number
                                  title
                                  repository {
                                    name
                                    owner { login }
                                  }
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }`;

              const res = await github.graphql(query, {
                id: projectId,
                after: endCursor,
              });

              const items = res.node.items.nodes;
              for (const item of items) {
                if (item.trackedItems?.nodes?.length) {
                  parentItems.push(item);
                }
              }

              hasNextPage = res.node.items.pageInfo.hasNextPage;
              endCursor = res.node.items.pageInfo.endCursor;
            }

            // === Step 3: Label sub-issues ===
            for (const parentItem of parentItems) {
              const parent = parentItem.content;
              const subIssues = parentItem.trackedItems.nodes;

              if (!parent || !subIssues.length) continue;

              let labelName = `Parent: ${parent.title}`;
              if (labelName.length > 50) {
                labelName = `Parent #${parent.number}`;
              }

              for (const sub of subIssues) {
                const subIssue = sub.content;
                if (!subIssue) continue;

                const subOwner = subIssue.repository.owner.login;
                const subRepo = subIssue.repository.name;

                console.log(`🏷️ Labeling issue #${subIssue.number} with '${labelName}'`);

                try {
                  await github.rest.issues.getLabel({ owner: subOwner, repo: subRepo, name: labelName });
                } catch {
                  await github.rest.issues.createLabel({
                    owner: subOwner,
                    repo: subRepo,
                    name: labelName,
                    color: 'cfd3d7',
                  });
                }

                await github.rest.issues.addLabels({
                  owner: subOwner,
                  repo: subRepo,
                  issue_number: subIssue.number,
                  labels: [labelName],
                });

                console.log(`✅ Labeled issue #${subIssue.number}`);
              }
            }
