name: Label Linked Sub-Issues

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  label-subissues:
    runs-on: ubuntu-latest
    steps:
      - name: Label sub-issues with parent title or number
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.LABEL_TOKEN }}
          script: |
            const { owner, repo } = context.repo;

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              per_page: 100,
            });

            console.log(`🔍 Found ${issues.length} open issues`);

            for (const parent of issues) {
              if (parent.pull_request) continue;

              const query = `
                query($owner:String!, $repo:String!, $issue:Int!) {
                  repository(owner:$owner, name:$repo) {
                    issue(number:$issue) {
                      title
                      timelineItems(itemTypes: [CONNECTED_EVENT], first: 100) {
                        nodes {
                          ... on ConnectedEvent {
                            subject {
                              ... on Issue {
                                number
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }`;

              let result;
              try {
                result = await github.graphql(query, {
                  owner,
                  repo,
                  issue: parent.number,
                });
              } catch (err) {
                console.warn(`⚠️ Skipping issue #${parent.number}: ${err.message}`);
                continue;
              }

              const connected = result.repository.issue.timelineItems.nodes;
              const subIssues = connected.map(e => e.subject).filter(Boolean);

              if (subIssues.length === 0) {
                console.log(`ℹ️ No sub-issues linked to parent #${parent.number}`);
                continue;
              }

              const parentTitle = result.repository.issue.title;
              let labelName = `Parent: ${parentTitle}`;
              if (labelName.length > 50) {
                labelName = `Parent #${parent.number}`;
              }

              console.log(`🏷️ Using label '${labelName}' for ${subIssues.length} sub-issues`);

              try {
                await github.rest.issues.getLabel({ owner, repo, name: labelName });
              } catch {
                console.log(`➕ Creating label '${labelName}'`);
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: labelName,
                  color: 'cfd3d7',
                });
              }

              for (const sub of subIssues) {
                console.log(`🔗 Labeling sub-issue #${sub.number} with '${labelName}'`);
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: sub.number,
                  labels: [labelName],
                });
                console.log(`✅ Labeled #${sub.number}`);
              }
            }
