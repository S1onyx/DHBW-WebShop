name: Label Linked Sub-Issues

on:
  schedule:
    - cron: '0 0 * * *'  # Täglich um Mitternacht UTC
  workflow_dispatch:      # Manuell auslösbar im Actions-Tab

permissions:
  issues: write

jobs:
  label-subissues:
    runs-on: ubuntu-latest
    steps:
      - name: Label linked sub-issues with parent issue number
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.LABEL_TOKEN }}  # <- Verwendet den PAT des Owners
          script: |
            const { owner, repo } = context.repo;

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              per_page: 100,
            });

            for (const issue of issues) {
              const query = `
                query($owner:String!, $repo:String!, $issue:Int!) {
                  repository(owner:$owner, name:$repo) {
                    issue(number:$issue) {
                      timelineItems(itemTypes: [CONNECTED_EVENT], first: 100) {
                        nodes {
                          ... on ConnectedEvent {
                            subject {
                              ... on Issue {
                                number
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }`;

              const result = await github.graphql(query, {
                owner,
                repo,
                issue: issue.number,
              });

              const connections = result.repository.issue.timelineItems.nodes;

              const parent = connections.find(event =>
                event.subject && event.subject.number !== issue.number
              );

              if (!parent) continue;

              const labelName = `Parent #${parent.subject.number}`;

              try {
                await github.rest.issues.getLabel({ owner, repo, name: labelName });
              } catch {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: labelName,
                  color: 'cfd3d7',
                });
              }

              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issue.number,
                labels: [labelName],
              });
            }
