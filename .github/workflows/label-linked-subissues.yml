name: Label Linked Sub-Issues

on:
  schedule:
    - cron: '0 0 * * *'  # Täglich um Mitternacht UTC
  workflow_dispatch:

permissions:
  issues: write

jobs:
  label-subissues:
    runs-on: ubuntu-latest
    steps:
      - name: Label linked sub-issues with parent title
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              per_page: 100,
            });

            for (const issue of issues) {
              const parentNumber = issue.number;
              const parentTitle = issue.title;

              const query = `
                query($owner:String!, $repo:String!, $issue:Int!) {
                  repository(owner:$owner, name:$repo) {
                    issue(number:$issue) {
                      title
                      timelineItems(itemTypes: [CONNECTED_EVENT], last: 100) {
                        nodes {
                          ... on ConnectedEvent {
                            subject {
                              ... on Issue {
                                number
                                title
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }`;

              const result = await github.graphql(query, {
                owner,
                repo,
                issue: parentNumber
              });

              const subIssues = result.repository.issue.timelineItems.nodes.map(n => n.subject).filter(Boolean);
              if (subIssues.length === 0) continue;

              const labelName = `Parent: ${parentTitle}`;

              try {
                await github.rest.issues.getLabel({ owner, repo, name: labelName });
              } catch {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: labelName,
                  color: 'cfd3d7',
                });
              }

              for (const sub of subIssues) {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: sub.number,
                  labels: [labelName],
                });
              }
            }
