version: "3.8"

services:
  db:
    image: postgres:16
    container_name: webshop_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: webshop
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backend/db/:/docker-entrypoint-initdb.d/
    ports:
      - "5432:5432"
    networks:
      - webshop-net

  backend:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.backend
    container_name: webshop_backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/webshop
      PORT: 3000
    depends_on:
      - db
    networks:
      - webshop-net

  frontend:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.frontend
    container_name: webshop_frontend
    restart: always
    networks:
      - webshop-net
    depends_on:
      - backend

  nginx:
    image: nginx:latest
    container_name: webshop_nginx
    ports:
      - "1337:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - frontend
    networks:
      - webshop-net

volumes:
  db_data:

networks:
  webshop-net:
    driver: bridge
